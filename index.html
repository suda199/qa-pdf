<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム 不明点 ＆ 質問共有ボード</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- メイン画面 (直接共有ボードを表示) -->
    <div id="main-app">
        <!-- 左側：共有ボードエリア -->
        <div class="board-area">
            <div class="board-header">
                <h2>📍 リアルタイム共有ボード (講義・発表スライド見立て)</h2>
                <p>ボード上の疑問・気になる部分をクリックしてマークを追加してください。</p>
            </div>
            
            <div id="shared-board" class="shared-board">
                <!-- マーカーがここに動的に配置されます -->
                <div class="board-grid-label">クリックして疑問点を配置</div>
            </div>
        </div>

        <!-- 右側：操作パネル -->
        <div class="form-area">
            <h2>💬 操作パネル</h2>
            
            <!-- 同期とステータス表示 -->
            <div id="sync-status" class="status-badge" style="display: none;">
                🔄 接続中...
            </div>
            
            <div class="status-badge" style="background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2);">
                📡 リアルタイム同期中
            </div>

            <!-- 不明点マーク作成用フォーム (最初から常に表示) -->
            <div id="form-content">
                <h3>🙋‍♂️ 新しいマークを追加</h3>
                <p style="font-size: 0.8rem; color: #94a3b8; margin-top: -8px; margin-bottom: 15px;">
                    左側のボード上のわからない部分をクリックして選択してください。
                </p>
                
                <div style="margin-bottom: 12px;">
                    <label>選択中の座標:</label>
                    <span id="coord-display" style="font-size: 0.9rem; color: #60a5fa; font-weight: 600;">未選択 (ボードをクリック)</span>
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="reason">わからない理由・質問内容</label>
                    <textarea id="reason" placeholder="例: このあたりの説明をもう少し詳しく聞きたいです！"></textarea>
                </div>

                <button id="add-btn">📍 マークを確定して全員に共有</button>
            </div>

            <!-- マーク記録一覧 -->
            <div style="border-top: 1px solid #475569; padding-top: 20px; display: flex; flex-direction: column; gap: 15px; flex-grow: 1;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0;">マーク一覧 <span class="marker-count" id="marker-count">0</span></h3>
                    <div style="display: flex; gap: 5px;">
                        <button id="export-btn" style="padding: 5px 10px; font-size: 0.7rem; width: auto;">保存</button>
                        <button id="import-btn" style="padding: 5px 10px; font-size: 0.7rem; width: auto; background:#475569;">読込</button>
                        <input type="file" id="import-file" accept=".json" style="display: none;">
                    </div>
                </div>
                
                <div id="marker-list" style="font-size: 0.85rem; max-height: 350px; overflow-y: auto; flex-grow: 1;">
                    まだマークはありません。
                </div>
                
                <p style="font-size: 0.7rem; color: #64748b; line-height: 1.4; margin: 0;">
                    ※ 誰かがマークを追加すると、このリストとボード上の位置にリアルタイムに反映されます。
                </p>
                
                <div id="network-info" style="font-size: 0.7rem; color: #64748b;">
                    ネットワーク: 接続確認中...
                </div>
            </div>
        </div>
    </div>

    <!-- ⚠️ システムエラー検知用デバッグコンソールパネル -->
    <div id="debug-error-console" style="display:none; position:fixed; bottom:0; left:0; width:100%; max-height:160px; background:#fef2f2; color:#991b1b; border-top:3px solid #f87171; z-index:9999; font-family:monospace; font-size:0.8rem; overflow-y:auto; padding:15px; box-sizing:border-box; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);">
        <div style="font-weight:bold; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #fca5a5; padding-bottom:5px;">
            <span>⚠️ ブラウザエラーを検知しました (エラー原因のデバッグログ)</span>
            <button onclick="document.getElementById('debug-error-console').style.display='none'" style="width:auto; padding:3px 10px; background:#ef4444; color:white; font-size:0.75rem; border:none; border-radius:4px; cursor:pointer; font-weight:600;">閉じる</button>
        </div>
        <div id="debug-error-list" style="white-space:pre-wrap; line-height:1.5;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
